<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title></title>
    <script>
      // rafgraph/spa-github-pages SPA fallback.
      // Preserves path+query+hash so React Router can resolve it via the
      // restore script in index.html.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(l.pathname + l.search) + (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
